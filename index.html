<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCF Grantee Social Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --ocean: #0d4f6e; --ocean-mid: #1a7a9a; --sand: #f5f0e8; --sky: #a8d4e0;
  --ink: #1a1a2e; --muted: #6b7a8d; --border: #dce4ea; --white: #ffffff;
  --card-shadow: 0 2px 12px rgba(13,79,110,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--sand); color: var(--ink); min-height: 100vh; }

.header { background: var(--ocean); padding: 24px 40px; display: flex; align-items: flex-end; justify-content: space-between; gap: 20px; flex-wrap: wrap; }
.header h1 { font-family: 'DM Serif Display', serif; font-size: 1.8rem; color: var(--white); letter-spacing: -0.01em; }
.header .sub { font-size: 0.8rem; color: var(--sky); margin-top: 4px; font-weight: 300; letter-spacing: 0.04em; text-transform: uppercase; }
.header-meta { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.stat-pill { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; padding: 5px 13px; font-size: 0.76rem; color: var(--sky); }
.stat-pill strong { color: var(--white); font-size: 0.95rem; display: block; line-height: 1.1; }
#last-updated { font-size: 0.73rem; color: rgba(168,212,224,0.7); }

.toolbar { background: var(--white); border-bottom: 1px solid var(--border); padding: 10px 40px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
.search-wrap { position: relative; min-width: 160px; max-width: 240px; flex: 1; }
.search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
#search { width: 100%; padding: 7px 12px 7px 32px; border: 1.5px solid var(--border); border-radius: 7px; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; color: var(--ink); background: var(--sand); outline: none; }
#search:focus { border-color: var(--ocean-mid); background: var(--white); }
#search::placeholder { color: var(--muted); }
.tdiv { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }
.flabel { font-size: 0.68rem; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap; flex-shrink: 0; }
.fgroup { display: flex; gap: 4px; flex-wrap: wrap; }
.fbtn { padding: 5px 10px; border-radius: 5px; border: 1.5px solid var(--border); background: var(--white); font-family: 'DM Sans', sans-serif; font-size: 0.73rem; font-weight: 500; color: var(--muted); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.fbtn:hover { border-color: var(--ocean-mid); color: var(--ocean); }
.fbtn.active { background: var(--ocean); border-color: var(--ocean); color: var(--white); }
.fbtn.loc-alaska.active    { background: #4a6fa5; border-color: #4a6fa5; }
.fbtn.loc-colorado.active  { background: #2e7d32; border-color: #2e7d32; }
.fbtn.loc-newmexico.active { background: #b71c1c; border-color: #b71c1c; }
.fbtn.loc-newyork.active   { background: #6a1b9a; border-color: #6a1b9a; }
.fbtn.loc-nc.active        { background: #00695c; border-color: #00695c; }
.fbtn.loc-bahamas.active   { background: #0277bd; border-color: #0277bd; }
.fbtn.loc-panama.active    { background: #e65100; border-color: #e65100; }
.fbtn.issue-land.active    { background: #558b2f; border-color: #558b2f; }
.fbtn.issue-water.active   { background: #0288d1; border-color: #0288d1; }
.fbtn.issue-ocean.active   { background: #01579b; border-color: #01579b; }
.fbtn.issue-future.active  { background: #f57f17; border-color: #f57f17; }

.feed-grid { display: grid; grid-template-columns: repeat(3, 1fr); min-height: calc(100vh - 180px); }
.feed-col { border-right: 1px solid var(--border); display: flex; flex-direction: column; }
.feed-col:last-child { border-right: none; }
.col-head { padding: 12px 16px; border-bottom: 2px solid var(--border); display: flex; align-items: center; gap: 9px; position: sticky; top: 65px; background: var(--white); z-index: 50; }
.col-head.ig { border-bottom-color: #c13584; }
.col-head.tw { border-bottom-color: #000; }
.col-head.fb { border-bottom-color: #1877f2; }
.picon { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.picon.ig { background: linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888); }
.picon.tw { background: #000; }
.picon.fb { background: #1877f2; }
.picon svg { color: white; }
.col-title { font-family: 'DM Serif Display', serif; font-size: 1rem; color: var(--ink); }
.col-count { margin-left: auto; font-size: 0.7rem; color: var(--muted); background: var(--sand); border-radius: 10px; padding: 2px 8px; font-weight: 500; }
.col-cards { padding: 8px; display: flex; flex-direction: column; gap: 6px; flex: 1; }

.card { background: var(--white); border: 1px solid var(--border); border-radius: 9px; padding: 10px 12px; transition: box-shadow 0.15s, transform 0.15s; }
.card:hover { box-shadow: var(--card-shadow); transform: translateY(-1px); }
.card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 5px; }
.org-name { font-size: 0.79rem; font-weight: 600; color: var(--ink); line-height: 1.3; flex: 1; }
.hlink { font-size: 0.7rem; text-decoration: none; font-weight: 500; white-space: nowrap; padding: 2px 7px; border-radius: 4px; transition: background 0.15s; flex-shrink: 0; }
.hlink.ig { background: #fce4f3; color: #c13584; }
.hlink.ig:hover { background: #f5c6e8; }
.hlink.tw { background: #f0f0f0; color: #333; }
.hlink.tw:hover { background: #e0e0e0; }
.hlink.fb { background: #e7f0fd; color: #1877f2; }
.hlink.fb:hover { background: #cfe0fb; }

.card-tags { display: flex; flex-wrap: wrap; gap: 3px; margin-bottom: 5px; }
.tag { font-size: 0.61rem; font-weight: 700; padding: 1px 6px; border-radius: 3px; letter-spacing: 0.02em; text-transform: uppercase; }
.tag-alaska    { background: #dce8f5; color: #4a6fa5; }
.tag-colorado  { background: #dcedc8; color: #2e7d32; }
.tag-newmexico { background: #ffcdd2; color: #b71c1c; }
.tag-newyork   { background: #e8d5f5; color: #6a1b9a; }
.tag-nc        { background: #d0f0eb; color: #00695c; }
.tag-bahamas   { background: #d1ecfd; color: #0277bd; }
.tag-panama    { background: #ffe0cc; color: #e65100; }
.tag-land      { background: #f1f8e9; color: #558b2f; }
.tag-water     { background: #e1f5fe; color: #0288d1; }
.tag-ocean     { background: #e3f2fd; color: #01579b; }
.tag-future    { background: #fff8e1; color: #f57f17; }

.post-preview { font-size: 0.74rem; color: var(--muted); line-height: 1.4; font-style: italic; padding: 5px 8px; background: var(--sand); border-radius: 5px; border-left: 2px solid var(--border); margin-top: 5px; }
.post-date { font-size: 0.66rem; color: var(--muted); margin-top: 3px; text-align: right; }
.empty-col { padding: 40px 20px; text-align: center; color: var(--muted); font-size: 0.84rem; font-style: italic; }
.dash-footer { background: var(--ocean); color: var(--sky); text-align: center; font-size: 0.74rem; padding: 13px; font-weight: 300; }

@media (max-width: 900px) {
  .feed-grid { grid-template-columns: 1fr; }
  .feed-col { border-right: none; border-bottom: 1px solid var(--border); }
  .header { padding: 18px 20px; }
  .toolbar { padding: 10px 16px; }
  .col-head { top: 80px; }
}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>MCF Grantee Social Dashboard</h1>
    <div class="sub">Social media monitoring · Instagram · X · Facebook</div>
  </div>

</div>

    <button class="fbtn loc-bahamas"   data-loc="bahamas"   onclick="setF('loc','bahamas',this)">Bahamas</button>
    <button class="fbtn loc-panama"    data-loc="panama"    onclick="setF('loc','panama',this)">Panama</button>
  </div>
  <div class="tdiv"></div>
  <span class="flabel">Issue</span>
  <div class="fgroup">
    <button class="fbtn active" data-issue="all" onclick="setF('issue','all',this)">All</button>
    <button class="fbtn issue-land"   data-issue="land"   onclick="setF('issue','land',this)">Land &amp; Forest</button>
    <button class="fbtn issue-water"  data-issue="water"  onclick="setF('issue','water',this)">Clean Water</button>
    <button class="fbtn issue-ocean"  data-issue="ocean"  onclick="setF('issue','ocean',this)">Healthy Oceans</button>
    <button class="fbtn issue-future" data-issue="future" onclick="setF('issue','future',this)">Future Generations</button>
  </div>
</div>

<div class="feed-grid">

  </div>
  <div class="feed-col">

      <span class="col-count" id="count-fb">—</span>

    <div class="col-cards" id="col-fb"></div>
  </div>
</div>

<div class="dash-footer">MCF Grantee Social Dashboard · Run a sweep in Claude to populate post previews</div>

const LL = {alaska:"Alaska",colorado:"Colorado",newmexico:"New Mexico",newyork:"New York",nc:"North Carolina",bahamas:"Bahamas",panama:"Panama"};
const IL = {land:"Land & Forest",water:"Clean Water",ocean:"Healthy Oceans",future:"Future Generations"};

let aLoc='all', aIss='all';

function setF(type, val, el) {
  if (type==='loc') {
    aLoc=val;
    document.querySelectorAll('[data-loc]').forEach(b=>b.classList.remove('active'));
  } else {
    aIss=val;
    document.querySelectorAll('[data-issue]').forEach(b=>b.classList.remove('active'));
  }
  el.classList.add('active');
  render();
}

function tags(g) {
  let h='';
  g.loc.forEach(l=>{h+=`<span class="tag tag-${l}">${LL[l]}</span>`;});
  g.iss.forEach(i=>{h+=`<span class="tag tag-${i}">${IL[i]}</span>`;});
  return h ? `<div class="card-tags">${h}</div>` : '';
}

function card(g, plat) {
  let handle, url, cls;
  if (plat==='ig') { handle=g.ig; url=handle?`https://www.instagram.com/${handle}/`:''; cls='ig'; }
  else if (plat==='tw') { handle=g.tw; url=handle?`https://x.com/${handle}`:''; cls='tw'; }
  else { handle=g.fb_h; url=g.fb_url; cls='fb'; }
  if (!handle && !url) return '';
  const disp = plat==='fb' ? handle : `@${handle}`;
  const post = POST_DATA[`${plat}_${handle}`];
  const ps = (post&&post.text)
    ? `<div class="post-preview">${post.text}</div><div class="post-date">${post.date||''}</div>`
    : `<div class="post-preview">No post data yet — run a sweep to populate.</div>`;
  return `<div class="card">
    <div class="card-top"><span class="org-name">${g.name}</span><a class="hlink ${cls}" href="${url}" target="_blank" rel="noopener">${disp}</a></div>
    ${tags(g)}${ps}
  </div>`;
}

function render() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const f = G.filter(g => {
    if (q && !g.name.toLowerCase().includes(q)) return false;
    if (aLoc!=='all' && !g.loc.includes(aLoc)) return false;
    if (aIss!=='all' && !g.iss.includes(aIss)) return false;
    return true;
  });
  let igH='',twH='',fbH='',igC=0,twC=0,fbC=0;
  f.forEach(g => {
    if (g.ig)          { igH+=card(g,'ig'); igC++; }
    if (g.tw)          { twH+=card(g,'tw'); twC++; }
    if (g.fb_h||g.fb_url) { fbH+=card(g,'fb'); fbC++; }
  });
  document.getElementById('col-ig').innerHTML = igH||'<div class="empty-col">No results</div>';
  document.getElementById('col-tw').innerHTML = twH||'<div class="empty-col">No results</div>';
  document.getElementById('col-fb').innerHTML = fbH||'<div class="empty-col">No results</div>';
  document.getElementById('count-ig').textContent = igC+' accounts';
  document.getElementById('count-tw').textContent = twC+' accounts';
  document.getElementById('count-fb').textContent = fbC+' accounts';
  document.getElementById('stat-ig').textContent = igC;
  document.getElementById('stat-tw').textContent = twC;
  document.getElementById('stat-fb').textContent = fbC;
  document.getElementById('stat-total').textContent = f.length;
}

document.getElementById('last-updated').textContent = 'Updated '+new Date().toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
render();
</script>
